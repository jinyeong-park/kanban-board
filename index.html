<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Kanban Board</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kanban">
<meta name="theme-color" content="#c8601a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #c8a97e 0%, #e8b97e 40%, #f0c070 70%, #e07050 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* NAV */
  .topnav {
    background: rgba(0,0,0,0.30);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .topnav-left { display: flex; align-items: center; gap: 14px; }
  .logo { display: flex; align-items: center; gap: 6px; }
  .logo svg { flex-shrink: 0; }
  .logo span { color: #fff; font-weight: 800; font-size: 17px; }
  .nav-btn { background: rgba(255,255,255,0.18); border-radius: 4px; padding: 5px 12px; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
  #searchInput {
    background: rgba(255,255,255,0.22);
    border: none; border-radius: 4px;
    padding: 7px 16px; color: #fff; font-size: 13px; width: 200px; outline: none;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.7); }
  .avatars { display: flex; gap: 6px; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 12px;
  }

  .subnav {
    background: rgba(0,0,0,0.22);
    backdrop-filter: blur(6px);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .subnav-btn { background: rgba(255,255,255,0.20); border-radius: 4px; padding: 5px 10px; color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .subnav-btn.active { background: rgba(255,255,255,0.45); color: #172b4d; }
  .board-title { color: #fff; font-weight: 800; font-size: 15px; margin-left: 6px; }
  .subnav-right { margin-left: auto; background: rgba(255,255,255,0.20); border-radius: 4px; padding: 5px 12px; color: #fff; font-size: 12px; font-weight: 500; }

  /* DAILY LOG PAGE */
  .log-page {
    display: none;
    padding: 24px 28px;
    min-height: calc(100vh - 88px);
  }
  .log-page.open { display: block; }
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .log-header h2 { color: #fff; font-size: 20px; font-weight: 800; }
  .log-export-btn {
    background: rgba(255,255,255,0.22); border: none; border-radius: 6px;
    padding: 7px 16px; color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .log-entry {
    background: rgba(255,255,255,0.92); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(9,30,66,0.12);
  }
  .log-date {
    font-size: 13px; font-weight: 800; color: #0052cc;
    margin-bottom: 8px; letter-spacing: 0.03em;
  }
  .log-items { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .log-items li {
    font-size: 13px; color: #172b4d; padding: 3px 0;
    display: flex; align-items: center; gap: 7px;
  }
  .log-items li::before {
    content: '✓'; color: #00C851; font-weight: 800; flex-shrink: 0;
  }
  .log-empty { color: rgba(255,255,255,0.75); font-size: 14px; text-align: center; margin-top: 60px; }

  /* BOARD */
  .board {
    display: flex;
    gap: 10px;
    padding: 14px;
    overflow-x: auto;
    align-items: flex-start;
    min-height: calc(100vh - 88px);
  }

  /* COLUMN */
  .column {
    flex: 0 0 270px;
    min-width: 255px;
    background: #ebecf0;
    border-radius: 10px;
    transition: box-shadow 0.15s;
  }
  .column.drag-over {
    box-shadow: 0 0 0 2px #0052cc inset;
    background: #dde0e4;
  }
  .col-header {
    padding: 12px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .col-title { font-weight: 700; font-size: 14px; color: #172b4d; }
  .col-menu { background: none; border: none; color: #6b778c; font-size: 16px; cursor: pointer; padding: 0 4px; border-radius: 4px; letter-spacing: 1px; }
  .col-menu:hover { background: rgba(9,30,66,0.08); }
  .col-header { position: relative; }
  .col-dropdown {
    position: absolute; top: 28px; right: 8px; z-index: 200;
    background: #fff; border-radius: 6px; min-width: 150px;
    box-shadow: 0 4px 16px rgba(9,30,66,0.22);
    padding: 4px 0; display: none;
  }
  .col-dropdown.open { display: block; }
  .col-dropdown button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; padding: 8px 14px;
    font-size: 13px; color: #de350b; cursor: pointer;
  }
  .col-dropdown button:hover { background: #fff4f4; }

  .cards-list {
    padding: 0 8px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 8px;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 1px 3px rgba(9,30,66,0.13);
    cursor: grab;
    transition: box-shadow 0.12s, opacity 0.12s;
    position: relative;
    user-select: none;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(9,30,66,0.22); }
  .card.dragging { opacity: 0.4; }
  .card:hover .card-actions { opacity: 1; }

  .card-actions {
    position: absolute; top: 6px; right: 6px;
    display: flex; gap: 2px;
    opacity: 0; transition: opacity 0.12s;
  }
  .card-actions button {
    background: rgba(9,30,66,0.09); border: none; border-radius: 4px;
    cursor: pointer; font-size: 11px; padding: 3px 5px; line-height: 1;
  }
  .card-actions button:hover { background: rgba(9,30,66,0.18); }

  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    border-radius: 4px; padding: 2px 9px;
    font-size: 11px; font-weight: 700;
  }
  .card-title { font-size: 14px; color: #172b4d; line-height: 1.5; }
  .card-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #5e6c84; margin-top: 8px;
  }
  .meta-date, .meta-check {
    display: flex; align-items: center; gap: 3px;
    border-radius: 3px; padding: 1px 4px;
  }
  .meta-done { background: #00C851; color: #fff; font-weight: 700; padding: 1px 6px; }

  .empty-drop {
    height: 8px; border-radius: 6px;
    transition: all 0.15s;
  }
  .empty-drop.active {
    height: 48px;
    background: rgba(0,82,204,0.12);
    border: 2px dashed #0052cc;
  }

  /* ADD CARD FORM */
  .add-form {
    background: #fff; border-radius: 8px; padding: 10px 12px;
    box-shadow: 0 1px 3px rgba(9,30,66,0.13);
    display: none; flex-direction: column; gap: 7px;
  }
  .add-form.open { display: flex; }
  .add-form textarea, .add-form input, .add-form select {
    border: 1px solid #dfe1e6; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; color: #172b4d;
    outline: none; font-family: inherit; width: 100%; resize: none;
  }
  .add-form textarea { border-color: #0052cc; border-width: 2px; font-size: 13px; }
  .add-form-btns { display: flex; gap: 6px; align-items: center; }
  .btn-add { background: #0052cc; border: none; border-radius: 4px; color: #fff; font-weight: 700; font-size: 13px; padding: 6px 14px; cursor: pointer; }
  .btn-cancel-form { background: none; border: none; color: #6b778c; font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1; }

  /* ADD ANOTHER CARD */
  .add-card-btn {
    display: flex; align-items: center; gap: 5px;
    width: 100%; background: none; border: none;
    cursor: pointer; color: #6b778c; font-size: 13px; font-weight: 500;
    padding: 8px 12px 12px; border-radius: 0 0 10px 10px;
    text-align: left; transition: background 0.12s, color 0.12s;
  }
  .add-card-btn:hover { background: rgba(9,30,66,0.08); color: #172b4d; }

  /* ADD LIST */
  .add-list-btn {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(4px);
    border-radius: 10px; padding: 10px 16px;
    cursor: pointer; color: #fff; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 5px;
    height: fit-content; white-space: nowrap; border: none;
  }
  .add-list-form {
    flex: 0 0 270px;
    background: #ebecf0;
    border-radius: 10px;
    padding: 10px 10px 8px;
    display: none; flex-direction: column; gap: 7px;
    height: fit-content;
  }
  .add-list-form.open { display: flex; }
  .add-list-form input {
    border: 2px solid #0052cc; border-radius: 4px;
    padding: 7px 10px; font-size: 13px; color: #172b4d;
    outline: none; font-family: inherit; width: 100%;
  }
  .add-list-form-btns { display: flex; gap: 6px; align-items: center; }
  .btn-add-list { background: #0052cc; border: none; border-radius: 4px; color: #fff; font-weight: 700; font-size: 13px; padding: 6px 14px; cursor: pointer; }
  .btn-cancel-list { background: none; border: none; color: #6b778c; font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(9,30,66,0.54);
    display: none; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #ebecf0; border-radius: 12px; width: 420px;
    box-shadow: 0 8px 40px rgba(9,30,66,0.4); overflow: hidden;
  }
  .modal-top { background: #fff; padding: 20px 24px 16px; border-bottom: 1px solid #dfe1e6; }
  .modal-label { font-size: 11px; font-weight: 700; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .modal-top textarea {
    border: 2px solid #0052cc; border-radius: 4px;
    padding: 8px 10px; font-size: 14px; color: #172b4d;
    resize: none; outline: none; font-family: inherit;
    width: 100%; font-weight: 500;
  }
  .modal-body { padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  .modal-body label { font-size: 11px; font-weight: 700; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
  .modal-body input, .modal-body select {
    background: #fff; border: 1px solid #dfe1e6; border-radius: 4px;
    padding: 7px 10px; font-size: 13px; color: #172b4d;
    outline: none; width: 100%; font-family: inherit;
  }
  .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .btn-save { flex: 1; background: #0052cc; border: none; border-radius: 4px; color: #fff; font-weight: 700; font-size: 13px; padding: 9px; cursor: pointer; }
  .btn-cancel { background: none; border: none; color: #6b778c; font-size: 13px; padding: 9px 14px; cursor: pointer; }
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <div class="topnav-left">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="6" fill="#0052CC"/>
        <rect x="6" y="8" width="11" height="22" rx="2" fill="white"/>
        <rect x="23" y="8" width="11" height="14" rx="2" fill="white"/>
      </svg>
      <span>Trello</span>
    </div>
    <button class="nav-btn">Workspaces ∨</button>
  </div>
  <input id="searchInput" placeholder="🔍  Jump to..." oninput="renderAll()">
  <div class="avatars">
    <div class="avatar" style="background:#FF8C00">M</div>
    <div class="avatar" style="background:#2196F3">J</div>
    <div class="avatar" style="background:#00C851">A</div>
  </div>
</div>

<!-- SUB NAV -->
<div class="subnav">
  <button class="subnav-btn active" id="btnBoard" onclick="showPage('board')">⊞ Board</button>
  <button class="subnav-btn" id="btnLog" onclick="showPage('log')">📋 Daily Log</button>
  <span class="board-title">My Kanban Board</span>
  <span style="color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer">☆</span>
<span id="savedBadge" style="color:#fff;font-size:12px;opacity:0;transition:opacity 0.4s;margin-left:4px;">✅ Saved</span>
  <button onclick="exportData()" style="margin-left:6px;background:rgba(255,255,255,0.15);border:none;border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;" title="Export as JSON">⬇ Export</button>
  <label style="margin-left:4px;background:rgba(255,255,255,0.15);border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;" title="Import JSON file">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
  <button onclick="resetAll()" style="margin-left:4px;background:rgba(255,255,255,0.15);border:none;border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;" title="Clear all cards">🔄 Reset</button>
</div>

<!-- BOARD -->
<div class="board" id="board">
  <!-- columns injected by JS -->
  <div class="add-list-form" id="addListForm">
    <input id="newListTitle" placeholder="리스트 이름을 입력하세요..." maxlength="60">
    <div class="add-list-form-btns">
      <button class="btn-add-list" onclick="submitAddList()">리스트 추가</button>
      <button class="btn-cancel-list" onclick="closeAddListForm()">✕</button>
    </div>
  </div>
  <button class="add-list-btn" id="addListBtn" onclick="openAddListForm()">+ Add another list</button>
</div>

<!-- DAILY LOG PAGE -->
<div class="log-page" id="logPage">
  <div class="log-header">
    <h2>📋 Daily Done Log</h2>
    <button class="log-export-btn" onclick="exportLog()">⬇ Download Log (.txt)</button>
  </div>
  <div id="logEntries"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-top">
      <div class="modal-label">✏️ Edit Card</div>
      <textarea id="editTitle" rows="2"></textarea>
    </div>
    <div class="modal-body">
      <div><label>Tags (comma separated)</label><input id="editTags"></div>
      <div><label>Due Date</label><input type="date" id="editDate"></div>
      <div><label>Checklist (e.g. 2/4)</label><input id="editChecklist"></div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1"><label>Created</label><input type="date" id="editCreatedAt"></div>
        <div style="flex:1" id="editDoneAtRow"><label>Done Date</label><input type="date" id="editDoneAt"></div>
      </div>
      <div>
        <label>Column</label>
        <select id="editCol"></select>
      </div>
      <div class="modal-btns">
        <button class="btn-save" onclick="saveEdit()">Save</button>
        <button class="btn-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const DEFAULT_COLUMNS = [
  { id: 'todo',    label: 'To Do' },
  { id: 'inprogress', label: 'In Progress' },
  { id: 'done',       label: 'Done' },
];
const LS_COLS = 'kanban_columns';
function loadColumns() {
  try {
    const saved = localStorage.getItem(LS_COLS);
    return saved ? JSON.parse(saved) : DEFAULT_COLUMNS.map(c => ({...c}));
  } catch { return DEFAULT_COLUMNS.map(c => ({...c})); }
}
let COLUMNS = loadColumns();

const TAG_COLORS = {
  'Marketing':  { bg: '#FF8C00', text: '#fff' },
  'Legal':      { bg: '#00C851', text: '#fff' },
  'External':   { bg: '#F5C518', text: '#222' },
  'Design':     { bg: '#00BCD4', text: '#fff' },
  'Production': { bg: '#9C27B0', text: '#fff' },
  'Sales':      { bg: '#2196F3', text: '#fff' },
  '개발':       { bg: '#2196F3', text: '#fff' },
  '기획':       { bg: '#FF8C00', text: '#fff' },
  '미팅':       { bg: '#9C27B0', text: '#fff' },
  '디자인':     { bg: '#00BCD4', text: '#fff' },
};
const TAG_PALETTE = [
  { bg: '#FF8C00', text: '#fff' },
  { bg: '#00C851', text: '#fff' },
  { bg: '#F5C518', text: '#222' },
  { bg: '#00BCD4', text: '#fff' },
  { bg: '#9C27B0', text: '#fff' },
  { bg: '#2196F3', text: '#fff' },
  { bg: '#E91E63', text: '#fff' },
  { bg: '#4CAF50', text: '#fff' },
  { bg: '#FF5722', text: '#fff' },
];

function tagStyle(tag) {
  if (TAG_COLORS[tag]) return TAG_COLORS[tag];
  const idx = [...tag].reduce((a, c) => a + c.charCodeAt(0), 0) % TAG_PALETTE.length;
  return TAG_PALETTE[idx];
}

const DEFAULT_CARDS = [
  { id: 1, title: 'Plan marketing campaign',           tags: ['Marketing'],           date: 'Sep 20', checklist: '0/3', col: 'todo' },
  { id: 2, title: 'Approve legal agreement',           tags: ['Legal'],               date: '',       checklist: '',    col: 'todo' },
  { id: 3, title: 'Schedule recurring client meeting', tags: ['Marketing'],           date: '',       checklist: '',    col: 'todo' },
  { id: 4, title: 'Collect design assets',             tags: ['External','Design'],   date: 'Mar 23', checklist: '1/3', col: 'inprogress' },
  { id: 5, title: 'Create 10 T-shirt options for launch day', tags: ['Production','Design'], date: 'Aug 26', checklist: '0/4', col: 'inprogress' },
  { id: 6, title: 'Update online shop',                tags: ['Sales'],               date: 'Sep 15', checklist: '',    col: 'inprogress' },
  { id: 7, title: 'Review legal agreement',            tags: ['Legal'],               date: 'Jun 30', checklist: '',    col: 'done' },
  { id: 8, title: 'Customer survey',                   tags: ['External','Marketing'],date: 'Jun 3',  checklist: '5/5', col: 'done' },
];

// ── LOCALSTORAGE ──────────────────────────────────────
const LS_KEY = 'kanban_cards';
const LS_ID  = 'kanban_nextId';
const LS_LOG = 'kanban_daily_log';

function loadData() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    return saved ? JSON.parse(saved) : DEFAULT_CARDS;
  } catch { return DEFAULT_CARDS; }
}
function saveData() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(cards));
    localStorage.setItem(LS_ID, String(nextId));
    localStorage.setItem(LS_COLS, JSON.stringify(COLUMNS));
    showSaved();
  } catch(e) { console.warn('저장 실패', e); }
}
function showSaved() {
  const el = document.getElementById('savedBadge');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 1800);
}
function resetAll() {
  if (!confirm('모든 카드를 삭제할까요?')) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_ID);
  cards = [];
  nextId = 1;
  saveData();
  renderAll();
}

let cards = loadData();
let nextId = parseInt(localStorage.getItem(LS_ID) || '9', 10);

// ── DAILY LOG ─────────────────────────────────────────
function loadLog() {
  try {
    const saved = localStorage.getItem(LS_LOG);
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}
let dailyLog = loadLog();

function saveLog() {
  try { localStorage.setItem(LS_LOG, JSON.stringify(dailyLog)); } catch(e) { console.warn('log save failed', e); }
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(str) {
  if (!str) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [, m, d] = str.split('-');
    return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}`;
  }
  return str; // legacy plain-text format
}

function logDoneCard(title) {
  const today = todayStr();
  let entry = dailyLog.find(e => e.date === today);
  if (!entry) {
    entry = { date: today, items: [] };
    dailyLog.unshift(entry);
  }
  if (!entry.items.includes(title)) {
    entry.items.push(title);
    saveLog();
  }
}

function renderLog() {
  const el = document.getElementById('logEntries');
  if (!el) return;
  if (dailyLog.length === 0) {
    el.innerHTML = '<p class="log-empty">No done items recorded yet.<br>Move cards to the Done column to start logging.</p>';
    return;
  }
  el.innerHTML = dailyLog.map(entry => `
    <div class="log-entry">
      <div class="log-date">${entry.date}</div>
      <ul class="log-items">
        ${entry.items.map(item => `<li>${item}</li>`).join('')}
      </ul>
    </div>
  `).join('');
}

function exportLog() {
  const lines = dailyLog.map(entry =>
    `${entry.date}\n${entry.items.map(i => `  ✓ ${i}`).join('\n')}`
  ).join('\n\n');
  const blob = new Blob([lines || '(empty)'], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `done-log-${todayStr().replace(/\//g, '-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function showPage(page) {
  const board = document.getElementById('board');
  const logPage = document.getElementById('logPage');
  const btnBoard = document.getElementById('btnBoard');
  const btnLog = document.getElementById('btnLog');
  if (page === 'log') {
    board.style.display = 'none';
    logPage.classList.add('open');
    btnBoard.classList.remove('active');
    btnLog.classList.add('active');
    renderLog();
  } else {
    board.style.display = '';
    logPage.classList.remove('open');
    btnBoard.classList.add('active');
    btnLog.classList.remove('active');
  }
}

// ── DRAG STATE ────────────────────────────────────────
let dragId = null;
let dragOverCol = null;

// ── RENDER ────────────────────────────────────────────
function renderAll() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const board = document.getElementById('board');
  const addListForm = document.getElementById('addListForm');
  const addBtn = document.getElementById('addListBtn');

  // remove old columns
  board.querySelectorAll('.column').forEach(el => el.remove());

  COLUMNS.forEach(col => {
    const colCards = cards.filter(c => c.col === col.id && (
      !q || c.title.toLowerCase().includes(q) ||
      c.tags.some(t => t.toLowerCase().includes(q))
    ));

    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.col = col.id;

    colEl.addEventListener('dragover', e => {
      e.preventDefault();
      dragOverCol = col.id;
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      colEl.classList.add('drag-over');
      colEl.querySelector('.empty-drop').classList.toggle('active', colCards.length === 0);
    });
    colEl.addEventListener('drop', e => {
      e.preventDefault();
      if (dragId !== null) {
        const dragged = cards.find(c => c.id === dragId);
        const movingToDone = dragged && col.id === 'done' && dragged.col !== 'done';
        if (movingToDone) logDoneCard(dragged.title);
        cards = cards.map(c => c.id === dragId ? {
          ...c,
          col: col.id,
          doneAt: movingToDone ? todayISO() : (col.id !== 'done' ? '' : c.doneAt)
        } : c);
        dragId = null;
        saveData();
      }
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      renderAll();
    });

    // Header
    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <button class="col-menu" onclick="toggleColMenu(event,'${col.id}')">•••</button>
        <div class="col-dropdown" id="colmenu-${col.id}">
          <button onclick="deleteList('${col.id}')">🗑 Delete List</button>
        </div>
      </div>
      <div class="cards-list" id="cards-${col.id}"></div>
      <div class="add-form" id="form-${col.id}">
        <textarea rows="2" placeholder="Enter card title..." id="ft-${col.id}"></textarea>
        <input placeholder="Tags (e.g. Marketing, Design)" id="ftags-${col.id}">
        <input type="date" id="fdate-${col.id}" title="Due date (optional)">
        <div class="add-form-btns">
          <button class="btn-add" onclick="submitAdd('${col.id}')">Add Card</button>
          <button class="btn-cancel-form" onclick="closeForm('${col.id}')">✕</button>
        </div>
      </div>
      <button class="add-card-btn" id="addbtn-${col.id}" onclick="openForm('${col.id}')">
        <span style="font-size:16px">+</span> Add another card
      </button>
    `;

    board.insertBefore(colEl, addListForm);

    const list = colEl.querySelector(`#cards-${col.id}`);

    // Empty drop zone
    const emptyDrop = document.createElement('div');
    emptyDrop.className = 'empty-drop';
    list.appendChild(emptyDrop);

    // Cards
    colCards.forEach(card => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.draggable = true;
      cardEl.dataset.id = card.id;

      // Check done state
      const clDone = (() => {
        if (!card.checklist) return false;
        const [a, b] = card.checklist.split('/');
        return a && b && a === b && a !== '0';
      })();
      const dateDone = card.col === 'done';

      const tagsHtml = card.tags.map(t => {
        const s = tagStyle(t);
        return `<span class="tag" style="background:${s.bg};color:${s.text}">${t}</span>`;
      }).join('');

      const createdStr = fmtDate(card.createdAt || '');
      const doneStr    = fmtDate(card.doneAt || '');
      const dueStr     = fmtDate(card.date || '');
      const isDone     = card.col === 'done';
      const metaHtml = (createdStr || dueStr || doneStr || card.checklist) ? `
        <div class="card-meta">
          ${createdStr ? `<span class="meta-date" title="Created">📅 ${createdStr}</span>` : ''}
          ${!isDone && dueStr ? `<span class="meta-date" title="Due">⏰ ${dueStr}</span>` : ''}
          ${isDone && doneStr ? `<span class="meta-date meta-done" title="Completed">✓ ${doneStr}</span>` : ''}
          ${card.checklist ? `<span class="meta-check ${clDone ? 'meta-done' : ''}">☑ ${card.checklist}</span>` : ''}
        </div>` : '';

      cardEl.innerHTML = `
        <div class="card-actions">
          <button onclick="openEdit(${card.id})">✏️</button>
          <button onclick="deleteCard(${card.id})">✕</button>
        </div>
        ${card.tags.length ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-title">${card.title}</div>
        ${metaHtml}
      `;

      cardEl.addEventListener('dragstart', e => {
        dragId = card.id;
        cardEl.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      cardEl.addEventListener('dragend', () => {
        cardEl.classList.remove('dragging');
        document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      });

      list.insertBefore(cardEl, emptyDrop);
    });

    // Re-attach textarea keydown
    const ta = colEl.querySelector(`#ft-${col.id}`);
    if (ta) {
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAdd(col.id); }
        if (e.key === 'Escape') closeForm(col.id);
      });
    }
  });
}

// ── FORM ACTIONS ──────────────────────────────────────
function openForm(colId) {
  document.getElementById(`form-${colId}`).classList.add('open');
  document.getElementById(`addbtn-${colId}`).style.display = 'none';
  setTimeout(() => document.getElementById(`ft-${colId}`).focus(), 50);
}
function closeForm(colId) {
  document.getElementById(`form-${colId}`).classList.remove('open');
  document.getElementById(`addbtn-${colId}`).style.display = '';
  document.getElementById(`ft-${colId}`).value = '';
  document.getElementById(`ftags-${colId}`).value = '';
  document.getElementById(`fdate-${colId}`).value = '';
}
function submitAdd(colId) {
  const title = document.getElementById(`ft-${colId}`).value.trim();
  if (!title) return;
  const tags = document.getElementById(`ftags-${colId}`).value.split(',').map(t => t.trim()).filter(Boolean);
  const date = document.getElementById(`fdate-${colId}`).value.trim();
  const doneAt = colId === 'done' ? todayISO() : '';
  cards.push({ id: nextId++, title, tags, date, checklist: '', col: colId, createdAt: todayISO(), doneAt });
  if (colId === 'done') logDoneCard(title);
  closeForm(colId);
  saveData();
  renderAll();
}

// ── EXPORT / IMPORT ───────────────────────────────────
function exportData() {
  const data = { columns: COLUMNS, cards, nextId, dailyLog };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `kanban-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.columns) || !Array.isArray(data.cards)) {
        alert('Invalid kanban JSON file.');
        return;
      }
      if (!confirm(`Import "${file.name}"? This will overwrite the current board.`)) return;
      COLUMNS = data.columns;
      cards = data.cards;
      nextId = data.nextId || (Math.max(0, ...cards.map(c => c.id)) + 1);
      if (Array.isArray(data.dailyLog)) { dailyLog = data.dailyLog; saveLog(); }
      saveData();
      renderAll();
    } catch {
      alert('Failed to read the file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── LIST ACTIONS ──────────────────────────────────────
function toggleColMenu(e, colId) {
  e.stopPropagation();
  const menu = document.getElementById(`colmenu-${colId}`);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.col-dropdown').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
}
document.addEventListener('click', () => {
  document.querySelectorAll('.col-dropdown').forEach(m => m.classList.remove('open'));
});

function deleteList(colId) {
  const col = COLUMNS.find(c => c.id === colId);
  const cardCount = cards.filter(c => c.col === colId).length;
  const msg = cardCount > 0
    ? `Delete "${col.label}"? The ${cardCount} card(s) inside will also be deleted.`
    : `Delete "${col.label}"?`;
  if (!confirm(msg)) return;
  COLUMNS = COLUMNS.filter(c => c.id !== colId);
  cards = cards.filter(c => c.col !== colId);
  saveData();
  renderAll();
}
// ── ADD LIST ──────────────────────────────────────────
function openAddListForm() {
  document.getElementById('addListForm').classList.add('open');
  document.getElementById('addListBtn').style.display = 'none';
  setTimeout(() => document.getElementById('newListTitle').focus(), 50);
}
function closeAddListForm() {
  document.getElementById('addListForm').classList.remove('open');
  document.getElementById('addListBtn').style.display = '';
  document.getElementById('newListTitle').value = '';
}
function submitAddList() {
  const label = document.getElementById('newListTitle').value.trim();
  if (!label) return;
  const id = 'col_' + Date.now();
  COLUMNS.push({ id, label });
  closeAddListForm();
  saveData();
  renderAll();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('newListTitle')) {
    submitAddList();
  }
  if (e.key === 'Escape' && document.getElementById('addListForm').classList.contains('open')) {
    closeAddListForm();
  }
});

// ── CARD ACTIONS ──────────────────────────────────────
function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  saveData();
  renderAll();
}

let editingId = null;
function openEdit(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  editingId = id;
  document.getElementById('editTitle').value = card.title;
  document.getElementById('editTags').value = card.tags.join(', ');
  document.getElementById('editDate').value = card.date || '';
  document.getElementById('editChecklist').value = card.checklist;
  document.getElementById('editCreatedAt').value = card.createdAt || '';
  document.getElementById('editDoneAt').value = card.doneAt || '';
  document.getElementById('editDoneAtRow').style.display = card.col === 'done' ? '' : 'none';
  const sel = document.getElementById('editCol');
  sel.innerHTML = COLUMNS.map(c => `<option value="${c.id}"${c.id === card.col ? ' selected' : ''}>${c.label}</option>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function saveEdit() {
  const card = cards.find(c => c.id === editingId);
  if (!card) return;
  const wasNotDone = card.col !== 'done';
  const newTitle = document.getElementById('editTitle').value.trim();
  const newCol = document.getElementById('editCol').value;
  const movingToDone = newCol === 'done' && wasNotDone;
  card.title = newTitle;
  card.tags = document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(Boolean);
  card.date = document.getElementById('editDate').value;
  card.checklist = document.getElementById('editChecklist').value.trim();
  card.col = newCol;
  card.createdAt = document.getElementById('editCreatedAt').value || card.createdAt || '';
  card.doneAt = movingToDone ? todayISO() : document.getElementById('editDoneAt').value || '';
  if (movingToDone) logDoneCard(newTitle);
  document.getElementById('modalOverlay').classList.remove('open');
  saveData();
  renderAll();
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── INIT ──────────────────────────────────────────────
renderAll();
</script>
