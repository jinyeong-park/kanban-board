<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Kanban Board</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kanban">
<meta name="theme-color" content="#c8601a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #c8a97e 0%, #e8b97e 40%, #f0c070 70%, #e07050 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* NAV */
  .topnav {
    background: rgba(0,0,0,0.30);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .topnav-left { display: flex; align-items: center; gap: 14px; }
  .logo { display: flex; align-items: center; gap: 6px; }
  .logo svg { flex-shrink: 0; }
  .logo span { color: #fff; font-weight: 800; font-size: 17px; }
  .nav-btn { background: rgba(255,255,255,0.18); border-radius: 4px; padding: 5px 12px; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
  #searchInput {
    background: rgba(255,255,255,0.22);
    border: none; border-radius: 4px;
    padding: 7px 16px; color: #fff; font-size: 13px; width: 200px; outline: none;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.7); }
  .avatars { display: flex; gap: 6px; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 12px;
  }

  .subnav {
    background: rgba(0,0,0,0.22);
    backdrop-filter: blur(6px);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .subnav-btn { background: rgba(255,255,255,0.20); border-radius: 4px; padding: 5px 10px; color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .subnav-btn.active { background: rgba(255,255,255,0.45); color: #172b4d; }
  .board-title { color: #fff; font-weight: 800; font-size: 15px; margin-left: 6px; }
  .subnav-right { margin-left: auto; background: rgba(255,255,255,0.20); border-radius: 4px; padding: 5px 12px; color: #fff; font-size: 12px; font-weight: 500; }

  /* DAILY LOG PAGE */
  .log-page {
    display: none;
    padding: 24px 28px;
    min-height: calc(100vh - 88px);
  }
  .log-page.open { display: block; }
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .log-body {
    display: flex; gap: 20px; align-items: flex-start;
  }
  .log-left {
    flex: 1; min-width: 0;
    max-height: calc(100vh - 160px); overflow-y: auto;
    padding-right: 4px;
  }
  .log-left::-webkit-scrollbar { width: 4px; }
  .log-left::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
  .log-right {
    flex: 0 0 420px; min-width: 320px;
    max-height: calc(100vh - 160px); overflow-y: auto;
  }
  .log-header h2 { color: #fff; font-size: 20px; font-weight: 800; }
  .log-export-btn {
    background: rgba(255,255,255,0.22); border: none; border-radius: 6px;
    padding: 7px 16px; color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .log-entry {
    background: rgba(255,255,255,0.92); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(9,30,66,0.12);
  }
  .log-date {
    font-size: 13px; font-weight: 800; color: #0052cc;
    margin-bottom: 8px; letter-spacing: 0.03em;
  }
  .log-items { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .log-items li {
    font-size: 13px; color: #172b4d; padding: 5px 0;
    display: flex; align-items: flex-start; gap: 7px; flex-direction: column;
  }
  .log-items li::before { display: none; }
  .log-item-title {
    display: flex; align-items: center; gap: 6px; font-weight: 600;
  }
  .log-item-title::before {
    content: '✓'; color: #00C851; font-weight: 800;
  }
  .log-item-meta {
    font-size: 11px; color: #5e6c84; margin-left: 18px;
    display: flex; align-items: center; gap: 4px;
  }
  .log-item-days {
    background: #e3fcef; color: #006644; font-weight: 700;
    border-radius: 4px; padding: 1px 7px; font-size: 11px;
    margin-left: 4px;
  }
  .log-empty { color: rgba(255,255,255,0.75); font-size: 14px; text-align: center; margin-top: 60px; }

  /* ANALYTICS */
  .analytics-title {
    color: #fff; font-size: 16px; font-weight: 800;
    margin-bottom: 14px; letter-spacing: 0.02em;
  }

  .stat-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 120px;
    background: rgba(255,255,255,0.92); border-radius: 10px;
    padding: 14px 16px; box-shadow: 0 2px 8px rgba(9,30,66,0.12);
  }
  .stat-label { font-size: 11px; font-weight: 700; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; color: #172b4d; line-height: 1; }
  .stat-sub { font-size: 11px; color: #5e6c84; margin-top: 4px; }
  .stat-up { color: #00875a; }
  .stat-down { color: #de350b; }

  .charts-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

  .chart-card {
    background: rgba(255,255,255,0.92); border-radius: 10px;
    padding: 16px 18px; box-shadow: 0 2px 8px rgba(9,30,66,0.12);
  }
  .chart-card.wide { flex: 2; min-width: 280px; }
  .chart-card.narrow { flex: 1; min-width: 180px; }
  .chart-title { font-size: 12px; font-weight: 700; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 70px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .bar { width: 100%; background: #0052cc; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
  .bar.today { background: #00875a; }
  .bar.empty { background: #dfe1e6; }
  .bar-label { font-size: 9px; color: #5e6c84; white-space: nowrap; }


  .insights-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .insight-card {
    flex: 1; min-width: 160px;
    background: rgba(255,255,255,0.92); border-radius: 10px;
    padding: 12px 16px; box-shadow: 0 2px 8px rgba(9,30,66,0.12);
    display: flex; align-items: flex-start; gap: 10px;
  }
  .insight-icon { font-size: 20px; flex-shrink: 0; line-height: 1.2; }
  .insight-text { font-size: 12px; color: #172b4d; line-height: 1.5; }
  .insight-text strong { display: block; font-size: 13px; margin-bottom: 2px; }
  .insight-card.warn { background: #fff8e1; }
  .insight-card.danger { background: #fff4f4; }

  /* BOARD */
  .board {
    display: flex;
    gap: 10px;
    padding: 14px;
    overflow-x: auto;
    align-items: flex-start;
    min-height: calc(100vh - 88px);
  }

  /* COLUMN */
  .column {
    flex: 0 0 270px;
    min-width: 255px;
    background: #ebecf0;
    border-radius: 10px;
    transition: box-shadow 0.15s;
  }
  .column.drag-over {
    box-shadow: 0 0 0 2px #0052cc inset;
    background: #dde0e4;
  }
  .col-header {
    padding: 12px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .col-title { font-weight: 700; font-size: 14px; color: #172b4d; }
  .col-menu { background: none; border: none; color: #6b778c; font-size: 16px; cursor: pointer; padding: 0 4px; border-radius: 4px; letter-spacing: 1px; }
  .col-menu:hover { background: rgba(9,30,66,0.08); }
  .col-header { position: relative; }
  .col-dropdown {
    position: absolute; top: 28px; right: 8px; z-index: 200;
    background: #fff; border-radius: 6px; min-width: 150px;
    box-shadow: 0 4px 16px rgba(9,30,66,0.22);
    padding: 4px 0; display: none;
  }
  .col-dropdown.open { display: block; }
  .col-dropdown button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; padding: 8px 14px;
    font-size: 13px; color: #de350b; cursor: pointer;
  }
  .col-dropdown button:hover { background: #fff4f4; }

  .cards-list {
    padding: 0 8px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 8px;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 1px 3px rgba(9,30,66,0.13);
    cursor: grab;
    transition: box-shadow 0.12s, opacity 0.12s;
    position: relative;
    user-select: none;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(9,30,66,0.22); }
  .card.dragging { opacity: 0.4; }
  .card:hover .card-actions { opacity: 1; }

  .card-actions {
    position: absolute; top: 6px; right: 6px;
    display: flex; gap: 2px;
    opacity: 0; transition: opacity 0.12s;
  }
  .card-actions button {
    background: rgba(9,30,66,0.09); border: none; border-radius: 4px;
    cursor: pointer; font-size: 11px; padding: 3px 5px; line-height: 1;
  }
  .card-actions button:hover { background: rgba(9,30,66,0.18); }

  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    border-radius: 4px; padding: 2px 9px;
    font-size: 11px; font-weight: 700;
  }
  .card-title { font-size: 14px; color: #172b4d; line-height: 1.5; }
  .card-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #5e6c84; margin-top: 8px;
  }
  .meta-date, .meta-check {
    display: flex; align-items: center; gap: 3px;
    border-radius: 3px; padding: 1px 4px;
  }
  .meta-done { background: #00C851; color: #fff; font-weight: 700; padding: 1px 6px; }

  .empty-drop {
    height: 8px; border-radius: 6px;
    transition: all 0.15s;
  }
  .empty-drop.active {
    height: 48px;
    background: rgba(0,82,204,0.12);
    border: 2px dashed #0052cc;
  }

  /* ADD CARD FORM */
  .add-form {
    background: #fff; border-radius: 8px; padding: 10px 12px;
    box-shadow: 0 1px 3px rgba(9,30,66,0.13);
    display: none; flex-direction: column; gap: 7px;
  }
  .add-form.open { display: flex; }
  .add-form textarea, .add-form input, .add-form select {
    border: 1px solid #dfe1e6; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; color: #172b4d;
    outline: none; font-family: inherit; width: 100%; resize: none;
  }
  .add-form textarea { border-color: #0052cc; border-width: 2px; font-size: 13px; }
  .add-form-btns { display: flex; gap: 6px; align-items: center; }
  .btn-add { background: #0052cc; border: none; border-radius: 4px; color: #fff; font-weight: 700; font-size: 13px; padding: 6px 14px; cursor: pointer; }
  .btn-cancel-form { background: none; border: none; color: #6b778c; font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1; }

  /* ADD ANOTHER CARD */
  .add-card-btn {
    display: flex; align-items: center; gap: 5px;
    width: 100%; background: none; border: none;
    cursor: pointer; color: #6b778c; font-size: 13px; font-weight: 500;
    padding: 8px 12px 12px; border-radius: 0 0 10px 10px;
    text-align: left; transition: background 0.12s, color 0.12s;
  }
  .add-card-btn:hover { background: rgba(9,30,66,0.08); color: #172b4d; }

  /* ADD LIST */
  .add-list-btn {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(4px);
    border-radius: 10px; padding: 10px 16px;
    cursor: pointer; color: #fff; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 5px;
    height: fit-content; white-space: nowrap; border: none;
  }
  .add-list-form {
    flex: 0 0 270px;
    background: #ebecf0;
    border-radius: 10px;
    padding: 10px 10px 8px;
    display: none; flex-direction: column; gap: 7px;
    height: fit-content;
  }
  .add-list-form.open { display: flex; }
  .add-list-form input {
    border: 2px solid #0052cc; border-radius: 4px;
    padding: 7px 10px; font-size: 13px; color: #172b4d;
    outline: none; font-family: inherit; width: 100%;
  }
  .add-list-form-btns { display: flex; gap: 6px; align-items: center; }
  .btn-add-list { background: #0052cc; border: none; border-radius: 4px; color: #fff; font-weight: 700; font-size: 13px; padding: 6px 14px; cursor: pointer; }
  .btn-cancel-list { background: none; border: none; color: #6b778c; font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(9,30,66,0.54);
    display: none; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #ebecf0; border-radius: 12px; width: 420px;
    box-shadow: 0 8px 40px rgba(9,30,66,0.4); overflow: hidden;
  }
  .modal-top { background: #fff; padding: 20px 24px 16px; border-bottom: 1px solid #dfe1e6; }
  .modal-label { font-size: 11px; font-weight: 700; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .modal-top textarea {
    border: 2px solid #0052cc; border-radius: 4px;
    padding: 8px 10px; font-size: 14px; color: #172b4d;
    resize: none; outline: none; font-family: inherit;
    width: 100%; font-weight: 500;
  }
  .modal-body { padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  .modal-body label { font-size: 11px; font-weight: 700; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
  .modal-body input, .modal-body select {
    background: #fff; border: 1px solid #dfe1e6; border-radius: 4px;
    padding: 7px 10px; font-size: 13px; color: #172b4d;
    outline: none; width: 100%; font-family: inherit;
  }
  .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .btn-save { flex: 1; background: #0052cc; border: none; border-radius: 4px; color: #fff; font-weight: 700; font-size: 13px; padding: 9px; cursor: pointer; }
  .btn-cancel { background: none; border: none; color: #6b778c; font-size: 13px; padding: 9px 14px; cursor: pointer; }
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <div class="topnav-left">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="6" fill="#0052CC"/>
        <rect x="6" y="8" width="11" height="22" rx="2" fill="white"/>
        <rect x="23" y="8" width="11" height="14" rx="2" fill="white"/>
      </svg>
      <span>Trello</span>
    </div>
    <button class="nav-btn">Workspaces ∨</button>
  </div>
  <input id="searchInput" placeholder="🔍  Jump to..." oninput="renderAll()">
  <div class="avatars">
    <div class="avatar" style="background:#FF8C00">M</div>
    <div class="avatar" style="background:#2196F3">J</div>
    <div class="avatar" style="background:#00C851">A</div>
  </div>
</div>

<!-- SUB NAV -->
<div class="subnav">
  <button class="subnav-btn active" id="btnBoard" onclick="showPage('board')">⊞ Board</button>
  <button class="subnav-btn" id="btnLog" onclick="showPage('log')">📋 Daily Log & Analytics</button>
  <span class="board-title">My Kanban Board</span>
  <span style="color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer">☆</span>
<span id="savedBadge" style="color:#fff;font-size:12px;opacity:0;transition:opacity 0.4s;margin-left:4px;">✅ Saved</span>
  <button onclick="exportData()" style="margin-left:6px;background:rgba(255,255,255,0.15);border:none;border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;" title="Export as JSON">⬇ Export</button>
  <label style="margin-left:4px;background:rgba(255,255,255,0.15);border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;" title="Import JSON file">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
  <button onclick="resetAll()" style="margin-left:4px;background:rgba(255,255,255,0.15);border:none;border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;" title="Clear all cards">🔄 Reset</button>
</div>

<!-- BOARD -->
<div class="board" id="board">
  <!-- columns injected by JS -->
  <div class="add-list-form" id="addListForm">
    <input id="newListTitle" placeholder="리스트 이름을 입력하세요..." maxlength="60">
    <div class="add-list-form-btns">
      <button class="btn-add-list" onclick="submitAddList()">리스트 추가</button>
      <button class="btn-cancel-list" onclick="closeAddListForm()">✕</button>
    </div>
  </div>
  <button class="add-list-btn" id="addListBtn" onclick="openAddListForm()">+ Add another list</button>
</div>

<!-- DAILY LOG PAGE -->
<div class="log-page" id="logPage">
  <div class="log-header">
    <h2>📋 Daily Done Log</h2>
    <button class="log-export-btn" onclick="exportLog()">⬇ Download Log (.txt)</button>
  </div>
  <div class="log-body">
    <div class="log-left" id="logEntries"></div>
    <div class="log-right">
      <div class="analytics" id="analyticsSection"></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-top">
      <div class="modal-label">✏️ Edit Card</div>
      <textarea id="editTitle" rows="2"></textarea>
    </div>
    <div class="modal-body">
      <div><label>Tags (comma separated)</label><input id="editTags"></div>
      <div><label>Due Date</label><input type="date" id="editDate"></div>
      <div><label>Checklist (e.g. 2/4)</label><input id="editChecklist"></div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1"><label>Created</label><input type="date" id="editCreatedAt"></div>
        <div style="flex:1" id="editDoneAtRow"><label>Done Date</label><input type="date" id="editDoneAt"></div>
      </div>
      <div>
        <label>Column</label>
        <select id="editCol"></select>
      </div>
      <div class="modal-btns">
        <button class="btn-save" onclick="saveEdit()">Save</button>
        <button class="btn-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const DEFAULT_COLUMNS = [
  { id: 'todo',    label: 'To Do' },
  { id: 'inprogress', label: 'In Progress' },
  { id: 'done',       label: 'Done' },
];
const LS_COLS = 'kanban_columns';
function loadColumns() {
  try {
    const saved = localStorage.getItem(LS_COLS);
    return saved ? JSON.parse(saved) : DEFAULT_COLUMNS.map(c => ({...c}));
  } catch { return DEFAULT_COLUMNS.map(c => ({...c})); }
}
let COLUMNS = loadColumns();

const TAG_COLORS = {
  'Marketing':  { bg: '#FF8C00', text: '#fff' },
  'Legal':      { bg: '#00C851', text: '#fff' },
  'External':   { bg: '#F5C518', text: '#222' },
  'Design':     { bg: '#00BCD4', text: '#fff' },
  'Production': { bg: '#9C27B0', text: '#fff' },
  'Sales':      { bg: '#2196F3', text: '#fff' },
  '개발':       { bg: '#2196F3', text: '#fff' },
  '기획':       { bg: '#FF8C00', text: '#fff' },
  '미팅':       { bg: '#9C27B0', text: '#fff' },
  '디자인':     { bg: '#00BCD4', text: '#fff' },
};
const TAG_PALETTE = [
  { bg: '#FF8C00', text: '#fff' },
  { bg: '#00C851', text: '#fff' },
  { bg: '#F5C518', text: '#222' },
  { bg: '#00BCD4', text: '#fff' },
  { bg: '#9C27B0', text: '#fff' },
  { bg: '#2196F3', text: '#fff' },
  { bg: '#E91E63', text: '#fff' },
  { bg: '#4CAF50', text: '#fff' },
  { bg: '#FF5722', text: '#fff' },
];

function tagStyle(tag) {
  if (TAG_COLORS[tag]) return TAG_COLORS[tag];
  const idx = [...tag].reduce((a, c) => a + c.charCodeAt(0), 0) % TAG_PALETTE.length;
  return TAG_PALETTE[idx];
}

const DEFAULT_CARDS = [

function loadLog() {
  try {
    const saved = localStorage.getItem(LS_LOG);
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}
let dailyLog = loadLog();

function saveLog() {
  try { localStorage.setItem(LS_LOG, JSON.stringify(dailyLog)); } catch(e) { console.warn('log save failed', e); }
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(str) {
  if (!str) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [, m, d] = str.split('-');
    return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}`;
  }
  return str; // legacy plain-text format
}

function daysBetween(from, to) {
  if (!from || !to) return null;
  const diff = new Date(to) - new Date(from);
  return Math.round(diff / (1000 * 60 * 60 * 24));
}
function dayLabel(n) {
  if (n === null) return '';
  if (n === 0) return 'same day';
  return `+${n} ${n === 1 ? 'day' : 'days'}`;
}

function logDoneCard(title, createdAt, doneAt) {
  const today = todayStr();
  let entry = dailyLog.find(e => e.date === today);
  if (!entry) {
    entry = { date: today, items: [] };
    dailyLog.unshift(entry);
  }
  const alreadyLogged = entry.items.some(i => (typeof i === 'string' ? i : i.title) === title);
  if (!alreadyLogged) {
    entry.items.push({ title, createdAt: createdAt || '', doneAt: doneAt || today });
    saveLog();
  }
}

function computeStreak() {
  const dates = new Set(dailyLog.map(e => e.date));
  let streak = 0;
  const d = new Date();
  while (true) {
    const s = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    if (dates.has(s)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function renderAnalytics() {
  const el = document.getElementById('analyticsSection');
  if (!el) return;

  // ── 기본 집계 ──
  const totalDone = dailyLog.reduce((sum, e) => sum + e.items.length, 0);

  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
  const twoWeeksAgo = new Date(now); twoWeeksAgo.setDate(now.getDate() - 14);

  const parseDate = s => new Date(s.replace(/\//g, '-'));

  const thisWeekDone = dailyLog
    .filter(e => parseDate(e.date) >= weekAgo)
    .reduce((sum, e) => sum + e.items.length, 0);
  const lastWeekDone = dailyLog
    .filter(e => { const d = parseDate(e.date); return d >= twoWeeksAgo && d < weekAgo; })
    .reduce((sum, e) => sum + e.items.length, 0);
  const weekDiff = thisWeekDone - lastWeekDone;

  // ── Cycle times ──
  const cycleTimes = [];
  dailyLog.forEach(e => e.items.forEach(item => {
    if (typeof item === 'object' && item.createdAt && item.doneAt) {
      const d = daysBetween(item.createdAt, item.doneAt);
      if (d !== null && d >= 0) cycleTimes.push({ days: d, title: item.title, doneAt: item.doneAt });
    }
  }));
  const avgCycle = cycleTimes.length
    ? (cycleTimes.reduce((a, b) => a + b.days, 0) / cycleTimes.length).toFixed(1)
    : null;

  const streak = computeStreak();

  // ── 최근 14일 바 차트 ──
  const todayISO2 = todayISO();
  const last14 = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    const entry = dailyLog.find(e => e.date === dStr);
    last14.push({
      count: entry ? entry.items.length : 0,
      label: d.toLocaleDateString('en-US', { weekday: 'short' }),
      isToday: i === 0
    });
  }
  const maxBar = Math.max(1, ...last14.map(d => d.count));

  // ── Cycle time trend SVG ──
  const sorted = [...cycleTimes]
    .filter(c => c.doneAt)
    .sort((a, b) => a.doneAt.localeCompare(b.doneAt));

  const trendSvg = (() => {
    if (sorted.length === 0) return '<div style="display:flex;align-items:center;justify-content:center;height:90px;color:#5e6c84;font-size:12px;">No data yet</div>';
    const W = 260, H = 95, padL = 26, padR = 8, padT = 8, padB = 22;
    const cW = W - padL - padR, cH = H - padT - padB;
    const n = sorted.length;
    const maxY = Math.max(...sorted.map(c => c.days), 1);
    const pts = sorted.map((c, i) => ({
      x: padL + (n === 1 ? cW / 2 : (i / (n - 1)) * cW),
      y: padT + cH - (c.days / maxY) * cH,
      days: c.days, title: c.title, doneAt: c.doneAt,
    }));
    // linear regression
    let trendPath = '';
    if (n >= 2) {
      const meanX = pts.reduce((a, p) => a + p.x, 0) / n;
      const meanY = pts.reduce((a, p) => a + p.y, 0) / n;
      const slope = pts.reduce((a, p) => a + (p.x - meanX) * (p.y - meanY), 0) /
                    pts.reduce((a, p) => a + (p.x - meanX) ** 2, 0);
      const b = meanY - slope * meanX;
      const x1 = pts[0].x, x2 = pts[n-1].x;
      const clamp = y => Math.max(padT, Math.min(padT + cH, y));
      const color = slope <= 0 ? '#00875a' : '#de350b';
      trendPath = `<line x1="${x1.toFixed(1)}" y1="${clamp(slope*x1+b).toFixed(1)}" x2="${x2.toFixed(1)}" y2="${clamp(slope*x2+b).toFixed(1)}" stroke="${color}" stroke-width="2" stroke-dasharray="5 3" opacity="0.8"/>`;
    }
    const polyline = n >= 2
      ? `<polyline points="${pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}" fill="none" stroke="#0052cc" stroke-width="1.5" opacity="0.35"/>`
      : '';
    const yTicks = [0, Math.round(maxY / 2), maxY].map(v => {
      const y = padT + cH - (v / maxY) * cH;
      return `<text x="${padL-4}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#8993a4">${v}d</text>
              <line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#f0f0f0" stroke-width="1"/>`;
    }).join('');
    const xIdxs = n === 1 ? [0] : [...new Set([0, Math.floor((n-1)/2), n-1])];
    const xTicks = xIdxs.map(i => {
      const d = new Date(sorted[i].doneAt);
      return `<text x="${pts[i].x.toFixed(1)}" y="${padT+cH+14}" text-anchor="middle" font-size="8" fill="#8993a4">${d.getMonth()+1}/${d.getDate()}</text>`;
    }).join('');
    const dots = pts.map(p =>
      `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="#0052cc" stroke="#fff" stroke-width="1.2">
        <title>${p.title} — ${p.days}d (${fmtDate(p.doneAt)})</title>
      </circle>`
    ).join('');
    const axes = `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+cH}" stroke="#dfe1e6" stroke-width="1"/>
                  <line x1="${padL}" y1="${padT+cH}" x2="${W-padR}" y2="${padT+cH}" stroke="#dfe1e6" stroke-width="1"/>`;
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${axes}${yTicks}${xTicks}${polyline}${trendPath}${dots}</svg>`;
  })();

  // trend direction label
  let trendLabel = '';
  if (sorted.length >= 2) {
    const first = sorted.slice(0, Math.ceil(sorted.length / 2));
    const last  = sorted.slice(Math.floor(sorted.length / 2));
    const avg = arr => arr.reduce((a, b) => a + b.days, 0) / arr.length;
    const diff = avg(last) - avg(first);
    trendLabel = diff < -0.5
      ? '<span style="color:#00875a;font-size:11px;font-weight:700;">▼ Getting faster</span>'
      : diff > 0.5
      ? '<span style="color:#de350b;font-size:11px;font-weight:700;">▲ Taking longer</span>'
      : '<span style="color:#5e6c84;font-size:11px;">→ Steady pace</span>';
  }

  // ── 요일별 생산성 ──
  const byDow = [0,0,0,0,0,0,0];
  dailyLog.forEach(e => { byDow[parseDate(e.date).getDay()] += e.items.length; });
  const bestDow = byDow.indexOf(Math.max(...byDow));
  const dowNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // ── Aging WIP (5일 이상 미이동 카드) ──
  const agingCards = cards.filter(c => c.col !== 'done' && c.createdAt && daysBetween(c.createdAt, todayISO2) >= 5);

  // ── 가장 빠른/느린 완료 ──
  const fastest = cycleTimes.length ? cycleTimes.reduce((a, b) => a.days <= b.days ? a : b) : null;
  const slowest = cycleTimes.length ? cycleTimes.reduce((a, b) => a.days >= b.days ? a : b) : null;

  // ── 렌더 ──
  const weekArrow = weekDiff > 0 ? `<span class="stat-up">▲ ${weekDiff} vs last week</span>`
    : weekDiff < 0 ? `<span class="stat-down">▼ ${Math.abs(weekDiff)} vs last week</span>`
    : `<span>same as last week</span>`;

  const barsHtml = last14.map(d => {
    const h = Math.round((d.count / maxBar) * 60);
    const cls = d.count === 0 ? 'empty' : d.isToday ? 'today' : '';
    return `<div class="bar-col">
      <div class="bar ${cls}" style="height:${d.count === 0 ? 4 : h}px" title="${d.count} done"></div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  }).join('');

  const insightsHtml = [
    byDow[bestDow] > 0 ? `
      <div class="insight-card">
        <div class="insight-icon">📅</div>
        <div class="insight-text">
          <strong>Most productive day</strong>
          ${dowNames[bestDow]} — ${byDow[bestDow]} tasks done
        </div>
      </div>` : '',
    agingCards.length > 0 ? `
      <div class="insight-card danger">
        <div class="insight-icon">⚠️</div>
        <div class="insight-text">
          <strong>${agingCards.length} stale card${agingCards.length > 1 ? 's' : ''}</strong>
          Sitting untouched for 5+ days
        </div>
      </div>` : `
      <div class="insight-card">
        <div class="insight-icon">✅</div>
        <div class="insight-text">
          <strong>No stale cards</strong>
          Everything is moving!
        </div>
      </div>`,
    fastest ? `
      <div class="insight-card">
        <div class="insight-icon">⚡</div>
        <div class="insight-text">
          <strong>Fastest done</strong>
          "${fastest.title.length > 28 ? fastest.title.slice(0,28)+'…' : fastest.title}"
          — ${dayLabel(fastest.days)}
        </div>
      </div>` : '',
    slowest && slowest.days > 1 ? `
      <div class="insight-card warn">
        <div class="insight-icon">🐢</div>
        <div class="insight-text">
          <strong>Took the longest</strong>
          "${slowest.title.length > 28 ? slowest.title.slice(0,28)+'…' : slowest.title}"
          — ${dayLabel(slowest.days)}
        </div>
      </div>` : '',
  ].filter(Boolean).join('');

  el.innerHTML = `
    <div class="analytics-title">Analytics</div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value">${last14[last14.length - 1].count}</div>
        <div class="stat-sub">done today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value">${thisWeekDone}</div>
        <div class="stat-sub">${weekArrow}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Done</div>
        <div class="stat-value">${totalDone}</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Cycle Time</div>
        <div class="stat-value">${avgCycle !== null ? avgCycle : '—'}</div>
        <div class="stat-sub">${avgCycle !== null ? 'days to done' : 'no data yet'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🔥 Streak</div>
        <div class="stat-value">${streak}</div>
        <div class="stat-sub">${streak === 1 ? 'day' : 'days'} in a row</div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-card wide">
        <div class="chart-title">Daily Completions — last 14 days</div>
        <div class="bar-chart">${barsHtml}</div>
      </div>
      <div class="chart-card narrow">
        <div class="chart-title">Cycle Time Trend</div>
        ${trendSvg}
        <div style="margin-top:4px;text-align:right">${trendLabel}</div>
      </div>
    </div>
    <div class="insights-row">${insightsHtml}</div>
  `;
}

function renderLog() {
  renderAnalytics();
  const el = document.getElementById('logEntries');
  if (!el) return;
  if (dailyLog.length === 0) {
    el.innerHTML = '<p class="log-empty">No done items recorded yet.<br>Move cards to the Done column to start logging.</p>';
    return;
  }
  el.innerHTML = dailyLog.map(entry => {
    const itemsHtml = entry.items.map(item => {
      // backward compat: old entries stored as plain string
      const title     = typeof item === 'string' ? item : item.title;
      const createdAt = typeof item === 'string' ? '' : item.createdAt;
      const doneAt    = typeof item === 'string' ? '' : item.doneAt;
      const days      = daysBetween(createdAt, doneAt);
      const meta = (createdAt || doneAt) ? `
        <span class="log-item-meta">
          ${createdAt ? `Created ${fmtDate(createdAt)}` : ''}
          ${createdAt && doneAt ? ' → ' : ''}
          ${doneAt ? `Done ${fmtDate(doneAt)}` : ''}
          ${days !== null ? `<span class="log-item-days">${dayLabel(days)}</span>` : ''}
        </span>` : '';
      return `<li><span class="log-item-title">${title}</span>${meta}</li>`;
    }).join('');
    return `
      <div class="log-entry">
        <div class="log-date">${entry.date}</div>
        <ul class="log-items">${itemsHtml}</ul>
      </div>`;
  }).join('');
}

function exportLog() {
  const lines = dailyLog.map(entry => {
    const itemLines = entry.items.map(item => {
      const title     = typeof item === 'string' ? item : item.title;
      const createdAt = typeof item === 'string' ? '' : item.createdAt;
      const doneAt    = typeof item === 'string' ? '' : item.doneAt;
      const days      = daysBetween(createdAt, doneAt);
      const meta = [
        createdAt ? `created ${fmtDate(createdAt)}` : '',
        doneAt    ? `done ${fmtDate(doneAt)}` : '',
        days !== null ? dayLabel(days) : '',
      ].filter(Boolean).join(' → ');
      return `  ✓ ${title}${meta ? `  (${meta})` : ''}`;
    }).join('\n');
    return `${entry.date}\n${itemLines}`;
  }).join('\n\n');
  const blob = new Blob([lines || '(empty)'], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `done-log-${todayStr().replace(/\//g, '-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

          ${createdStr ? `<span class="meta-date" title="Created">📅 ${createdStr}</span>` : ''}
          ${!isDone && dueStr ? `<span class="meta-date" title="Due">⏰ ${dueStr}</span>` : ''}
          ${isDone && doneStr ? `<span class="meta-date meta-done" title="Completed">✓ ${doneStr}</span>` : ''}
          ${card.checklist ? `<span class="meta-check ${clDone ? 'meta-done' : ''}">☑ ${card.checklist}</span>` : ''}
        </div>` : '';

      cardEl.innerHTML = `
        <div class="card-actions">
          <button onclick="openEdit(${card.id})">✏️</button>
          <button onclick="deleteCard(${card.id})">✕</button>
        </div>
        ${card.tags.length ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-title">${card.title}</div>
        ${metaHtml}
      `;

      cardEl.addEventListener('dragstart', e => {
        dragId = card.id;
        cardEl.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      cardEl.addEventListener('dragend', () => {
        cardEl.classList.remove('dragging');
        document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      });

      list.insertBefore(cardEl, emptyDrop);
    });

    // Re-attach textarea keydown
    const ta = colEl.querySelector(`#ft-${col.id}`);
    if (ta) {
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAdd(col.id); }
        if (e.key === 'Escape') closeForm(col.id);
      });
    }
  });
}

// ── FORM ACTIONS ──────────────────────────────────────
function openForm(colId) {
  document.getElementById(`form-${colId}`).classList.add('open');
  document.getElementById(`addbtn-${colId}`).style.display = 'none';
  setTimeout(() => document.getElementById(`ft-${colId}`).focus(), 50);
}
function closeForm(colId) {
  document.getElementById(`form-${colId}`).classList.remove('open');
  document.getElementById(`addbtn-${colId}`).style.display = '';
  document.getElementById(`ft-${colId}`).value = '';
  document.getElementById(`ftags-${colId}`).value = '';
  document.getElementById(`fdate-${colId}`).value = '';
}
function submitAdd(colId) {
  const title = document.getElementById(`ft-${colId}`).value.trim();
  if (!title) return;
  const tags = document.getElementById(`ftags-${colId}`).value.split(',').map(t => t.trim()).filter(Boolean);
  const date = document.getElementById(`fdate-${colId}`).value.trim();
  const doneAt = colId === 'done' ? todayISO() : '';
  cards.push({ id: nextId++, title, tags, date, checklist: '', col: colId, createdAt: todayISO(), doneAt });
  if (colId === 'done') logDoneCard(title, todayISO(), todayISO());
  closeForm(colId);
  saveData();
  renderAll();
}

// ── EXPORT / IMPORT ───────────────────────────────────
function exportData() {
  const data = { columns: COLUMNS, cards, nextId, dailyLog };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `kanban-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.columns) || !Array.isArray(data.cards)) {
        alert('Invalid kanban JSON file.');
        return;
      }
      if (!confirm(`Import "${file.name}"? This will overwrite the current board.`)) return;
      COLUMNS = data.columns;
      cards = data.cards;
      nextId = data.nextId || (Math.max(0, ...cards.map(c => c.id)) + 1);
      if (Array.isArray(data.dailyLog)) { dailyLog = data.dailyLog; saveLog(); }
      saveData();
      renderAll();
    } catch {
      alert('Failed to read the file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── LIST ACTIONS ──────────────────────────────────────
function toggleColMenu(e, colId) {
  e.stopPropagation();
  const menu = document.getElementById(`colmenu-${colId}`);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.col-dropdown').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
}
document.addEventListener('click', () => {
  document.querySelectorAll('.col-dropdown').forEach(m => m.classList.remove('open'));
});

function deleteList(colId) {
  const col = COLUMNS.find(c => c.id === colId);
  const cardCount = cards.filter(c => c.col === colId).length;
  const msg = cardCount > 0
    ? `Delete "${col.label}"? The ${cardCount} card(s) inside will also be deleted.`
    : `Delete "${col.label}"?`;
  if (!confirm(msg)) return;
  COLUMNS = COLUMNS.filter(c => c.id !== colId);
  cards = cards.filter(c => c.col !== colId);
  saveData();
  renderAll();
}
// ── ADD LIST ──────────────────────────────────────────
function openAddListForm() {
  document.getElementById('addListForm').classList.add('open');
  document.getElementById('addListBtn').style.display = 'none';
  setTimeout(() => document.getElementById('newListTitle').focus(), 50);
}
function closeAddListForm() {
  document.getElementById('addListForm').classList.remove('open');
  document.getElementById('addListBtn').style.display = '';
  document.getElementById('newListTitle').value = '';
}
function submitAddList() {
  const label = document.getElementById('newListTitle').value.trim();
  if (!label) return;
  const id = 'col_' + Date.now();
  COLUMNS.push({ id, label });
  closeAddListForm();
  saveData();
  renderAll();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('newListTitle')) {
    submitAddList();
  }
  if (e.key === 'Escape' && document.getElementById('addListForm').classList.contains('open')) {
    closeAddListForm();
  }
});

// ── CARD ACTIONS ──────────────────────────────────────
function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  saveData();
  renderAll();
}

let editingId = null;
function openEdit(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  editingId = id;
  document.getElementById('editTitle').value = card.title;
  document.getElementById('editTags').value = card.tags.join(', ');
  document.getElementById('editDate').value = card.date || '';
  document.getElementById('editChecklist').value = card.checklist;
  document.getElementById('editCreatedAt').value = card.createdAt || '';
  document.getElementById('editDoneAt').value = card.doneAt || '';
  document.getElementById('editDoneAtRow').style.display = card.col === 'done' ? '' : 'none';
  const sel = document.getElementById('editCol');
  sel.innerHTML = COLUMNS.map(c => `<option value="${c.id}"${c.id === card.col ? ' selected' : ''}>${c.label}</option>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function saveEdit() {
  const card = cards.find(c => c.id === editingId);
  if (!card) return;
  const wasNotDone = card.col !== 'done';
  const newTitle = document.getElementById('editTitle').value.trim();
  const newCol = document.getElementById('editCol').value;
  const movingToDone = newCol === 'done' && wasNotDone;
  card.title = newTitle;
  card.tags = document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(Boolean);
  card.date = document.getElementById('editDate').value;
  card.checklist = document.getElementById('editChecklist').value.trim();
  card.col = newCol;
  card.createdAt = document.getElementById('editCreatedAt').value || card.createdAt || '';
  card.doneAt = movingToDone ? todayISO() : document.getElementById('editDoneAt').value || '';
  if (movingToDone) logDoneCard(newTitle, card.createdAt, todayISO());
  document.getElementById('modalOverlay').classList.remove('open');
  saveData();
  renderAll();
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── INIT ──────────────────────────────────────────────
renderAll();
</script>
